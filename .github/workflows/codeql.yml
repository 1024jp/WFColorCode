name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 13 * * 5'
    
permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: macos-26
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.4.app

    strategy:
      fail-fast: false
      matrix:
        language: ['swift']
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: manual

      - name: Build Swift package
        run: swift build

      - name: Analyze
        uses: github/codeql-action/analyze@v4
