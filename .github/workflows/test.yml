name: Test

on: [push, pull_request]

permissions:
  contents: read

jobs:
  test:
    name: Test on ${{ matrix.platform }}
    runs-on: macos-26
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.4.app
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macOS
            command: swift test
          - platform: iOS
            command: |
              xcodebuild test \
                -scheme ColorCode \
                -destination 'platform=iOS Simulator,OS=26.4,name=iPhone 17' \
                -skipPackagePluginValidation
    steps:
    - name: Show environments
      run: |
        xcodebuild -version
        swift --version
    - name: Checkout
      uses: actions/checkout@v5
    - name: Unit Test
      run: |
        ${{ matrix.command }}
